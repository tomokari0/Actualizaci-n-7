    <style>
      body {
        font-family: 'Montserrat', sans-serif;
      }
      .font-bebas {
        font-family: 'Bebas Neue', sans-serif;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Animations */
      @keyframes kenburns {
        0% { transform: scale(1.05); }
        100% { transform: scale(1.1); }
      }
      .animate-kenburns {
        animation: kenburns 30s ease-out forwards alternate;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-in-out forwards;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0; /* Start hidden */
      }
      .animate-fade-in-up-delay-1 { animation-delay: 0.2s; }
      .animate-fade-in-up-delay-2 { animation-delay: 0.4s; }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in {
        animation: scaleIn 0.3s ease-out forwards;
      }
      
      /* Custom progress bar for video player */
      input[type=range].video-progress {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        background: transparent;
        cursor: pointer;
      }
      input[type=range].video-progress::-webkit-slider-runnable-track {
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
      }
      input[type=range].video-progress::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        background: #ef4444; /* red-500 */
        border-radius: 50%;
        margin-top: -5.5px;
        transition: transform 0.2s;
      }
       input[type=range].video-progress:hover::-webkit-slider-thumb {
        transform: scale(1.2);
      }
    </style>
